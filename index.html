<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Sample Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">GitHub upload check</p>
        <h1 id="page-title">가벼운 샘플 웹 페이지</h1>
        <p class="lead">
          Codex가 로컬 파일을 만들고, 브라우저에서 표시를 확인하기 위한 작은 정적 페이지입니다.
        </p>
        <a class="button" href="https://github.com/" target="_blank" rel="noreferrer">
          GitHub 열기
        </a>
      </section>

      <section class="status-grid" aria-label="검증 상태">
        <article>
          <span class="status-dot"></span>
          <h2>HTML 생성</h2>
          <p>기본 문서 구조와 접근성 라벨을 포함했습니다.</p>
        </article>
        <article>
          <span class="status-dot"></span>
          <h2>CSS 적용</h2>
          <p>반응형 레이아웃과 카드 스타일을 별도 파일로 분리했습니다.</p>
        </article>
        <article>
          <span class="status-dot pending"></span>
          <h2>GitHub 업로드</h2>
          <p>GitHub 인증이 준비되면 바로 커밋하고 업로드할 수 있습니다.</p>
        </article>
      </section>
    </main>
  </body>
</html>
